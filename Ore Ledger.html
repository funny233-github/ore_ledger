<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ore Ledger — Claude Style</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
  /* ========================================
     RESET & BASE
     ======================================== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ========================================
     DEFAULT: DARK MODE (Claude dark theme)
     ======================================== */
  :root {
    /* Backgrounds — brighter dark */
    --bg: oklch(0.175 0.007 85);
    --bg-sidebar: oklch(0.155 0.007 85);
    --bg-sidebar-hover: oklch(0.22 0.01 85);
    --bg-sidebar-active: oklch(0.26 0.012 85);

    --surface: oklch(0.205 0.008 85);
    --surface-hover: oklch(0.24 0.01 85);
    --surface-elevated: oklch(0.22 0.009 85);

    --border: oklch(0.27 0.007 85);
    --border-light: oklch(0.23 0.006 85);
    --border-sidebar: oklch(0.21 0.008 85);

    /* Accent — warm amber */
    --accent: oklch(0.62 0.175 72);
    --accent-light: oklch(0.72 0.12 72);
    --accent-dark: oklch(0.50 0.175 72);
    --accent-subtle: oklch(0.62 0.175 72 / 0.14);
    --accent-glow: oklch(0.62 0.175 72 / 0.08);

    /* Text */
    --text: oklch(0.92 0.004 85);
    --text-secondary: oklch(0.70 0.006 85);
    --text-muted: oklch(0.52 0.005 85);
    --text-inverse: oklch(0.12 0.008 85);

    /* Sidebar text */
    --text-sidebar: oklch(0.60 0.008 85);
    --text-sidebar-active: oklch(0.93 0.004 85);
    --text-sidebar-muted: oklch(0.40 0.008 85);

    /* Semantic */
    --green: oklch(0.58 0.16 145);
    --green-bg: oklch(0.58 0.16 145 / 0.12);
    --red: oklch(0.55 0.18 30);
    --red-bg: oklch(0.55 0.18 30 / 0.12);
    --blue: oklch(0.53 0.16 250);
    --blue-bg: oklch(0.53 0.16 250 / 0.12);
    --amber: oklch(0.62 0.14 85);
    --amber-bg: oklch(0.62 0.14 85 / 0.12);

    /* Shadows */
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.15);
    --shadow-md: 0 2px 8px oklch(0 0 0 / 0.2);
    --shadow-lg: 0 8px 30px oklch(0 0 0 / 0.25);
    --shadow-elevated: 0 4px 24px oklch(0 0 0 / 0.3);

    /* Radii */
    --radius-sm: 0;
    --radius-md: 0;
    --radius-lg: 0;

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
    --space-3xl: 64px;

    --transition: 180ms cubic-bezier(0.25, 0.1, 0.25, 1);
    --transition-spring: 350ms cubic-bezier(0.34, 1.56, 0.64, 1);
    --sidebar-w: 240px;
  }

  /* ========================================
     LIGHT MODE OVERRIDE
     ======================================== */
  [data-theme="light"] {
    --bg: oklch(0.982 0.004 85);
    --bg-sidebar: oklch(0.155 0.008 85);
    --bg-sidebar-hover: oklch(0.22 0.01 85);
    --bg-sidebar-active: oklch(0.27 0.012 85);

    --surface: oklch(0.998 0.002 85);
    --surface-hover: oklch(0.97 0.006 85);
    --surface-elevated: oklch(1 0 0);

    --border: oklch(0.91 0.006 85);
    --border-light: oklch(0.945 0.005 85);
    --border-sidebar: oklch(0.22 0.008 85);

    --accent: oklch(0.62 0.175 72);
    --accent-light: oklch(0.74 0.11 72);
    --accent-dark: oklch(0.48 0.17 72);
    --accent-subtle: oklch(0.62 0.175 72 / 0.10);
    --accent-glow: oklch(0.62 0.175 72 / 0.06);

    --text: oklch(0.12 0.01 85);
    --text-secondary: oklch(0.35 0.014 85);
    --text-muted: oklch(0.52 0.01 85);
    --text-inverse: oklch(0.97 0.003 85);

    --text-sidebar: oklch(0.60 0.01 85);
    --text-sidebar-active: oklch(0.95 0.004 85);
    --text-sidebar-muted: oklch(0.40 0.006 85);

    --green: oklch(0.55 0.16 145);
    --green-bg: oklch(0.55 0.16 145 / 0.08);
    --red: oklch(0.52 0.18 30);
    --red-bg: oklch(0.52 0.18 30 / 0.08);
    --blue: oklch(0.50 0.16 250);
    --blue-bg: oklch(0.50 0.16 250 / 0.08);
    --amber: oklch(0.60 0.15 85);
    --amber-bg: oklch(0.60 0.15 85 / 0.08);

    --shadow-sm: 0 0.5px 1.5px oklch(0 0 0 / 0.04);
    --shadow-md: 0 2px 8px oklch(0 0 0 / 0.05);
    --shadow-lg: 0 8px 30px oklch(0 0 0 / 0.07);
    --shadow-elevated: 0 4px 24px oklch(0 0 0 / 0.10);
  }

  html { font-size: 16px; }
  body {
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  input, select, button, textarea { font-family: inherit; font-size: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { opacity: 0.8; }

  /* ----- Scrollbar ----- */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ----- Global transitions ----- */
  .page {
    width: 100%;
    animation: pageEnter 300ms ease-out;
  }

  @keyframes pageEnter {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Entry animation for cards */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-enter { animation: fadeUp 350ms ease-out both; }
  .card-enter:nth-child(1) { animation-delay: 0ms; }
  .card-enter:nth-child(2) { animation-delay: 60ms; }
  .card-enter:nth-child(3) { animation-delay: 120ms; }
  .card-enter:nth-child(4) { animation-delay: 180ms; }

  /* Toast animation */
  @keyframes toastSlide {
    from { transform: translateX(100%) translateY(-8px); opacity: 0; }
    to { transform: translateX(0) translateY(0); opacity: 1; }
  }

  @keyframes toastSlideOut {
    from { transform: translateX(0) translateY(0); opacity: 1; }
    to { transform: translateX(100%) translateY(-8px); opacity: 0; }
  }

  /* Focus ring */
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* Smooth number input */
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Selection */
  ::selection { background: var(--accent-subtle); color: var(--accent-dark); }

  /* ----- Responsive ----- */
  @media (max-width: 768px) {
    :root { --sidebar-w: 64px; }
    .sidebar-label { display: none; }
    .sidebar-section-title { display: none; }
  }

  @media (max-width: 480px) {
    html { font-size: 14px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel CDN -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<script type="text/babel" id="app-code">
  const { useState, useCallback, useMemo, useEffect, useRef, createContext, useContext } = React;

  /* ====================================================
     SECTION 1: DATA MODEL (Task 2)
     ==================================================== */

  /* --- 16 Ore Types --- */
  const ORES = [
    // Shallow (7)
    { id: 'shallow_coal',       name: 'Shallow Coal',       category: 'shallow' },
    { id: 'shallow_copper',     name: 'Shallow Copper',     category: 'shallow' },
    { id: 'shallow_iron',       name: 'Shallow Iron',       category: 'shallow' },
    { id: 'shallow_diamond',    name: 'Shallow Diamond',    category: 'shallow' },
    { id: 'shallow_emerald',    name: 'Shallow Emerald',    category: 'shallow' },
    { id: 'shallow_redstone',   name: 'Shallow Redstone',   category: 'shallow' },
    { id: 'shallow_lapis',      name: 'Shallow Lapis Lazuli', category: 'shallow' },
    // Deep (7)
    { id: 'deep_coal',          name: 'Deep Coal',          category: 'deep' },
    { id: 'deep_copper',        name: 'Deep Copper',        category: 'deep' },
    { id: 'deep_iron',          name: 'Deep Iron',          category: 'deep' },
    { id: 'deep_diamond',       name: 'Deep Diamond',       category: 'deep' },
    { id: 'deep_emerald',       name: 'Deep Emerald',       category: 'deep' },
    { id: 'deep_redstone',      name: 'Deep Redstone',      category: 'deep' },
    { id: 'deep_lapis',         name: 'Deep Lapis Lazuli',  category: 'deep' },
    // Nether (2)
    { id: 'nether_quartz',      name: 'Nether Quartz',      category: 'nether' },
    { id: 'nether_gold',        name: 'Nether Gold Ore',    category: 'nether' },
  ];

  /* --- Transaction Types --- */
  const TX_TYPES = ['buy', 'sell', 'mine_sell', 'expense', 'balance_adjust'];

  const TX_TYPE_CONFIG = {
    buy:     { label: 'Buy',       icon: '↓',   key: 'buy' },
    sell:    { label: 'Sell',      icon: '↑',   key: 'sell' },
    mine_sell: { label: 'Mine Sale', icon: '⛏', key: 'mine_sell' },
    expense: { label: 'Expense',   icon: '✕',   key: 'expense' },
    balance_adjust: { label: 'Adjust', icon: '⟳', key: 'balance_adjust' },
  };

  /* --- ID Generator --- */
  let _idCounter = Date.now();
  const generateId = () => `tx_${_idCounter++}_${Math.random().toString(36).slice(2, 6)}`;

  /* --- Default State Factory --- */
  const createEmptyState = () => ({
    version: 1,
    transactions: [],
    cash: 0,
    portfolio: {}, // { [oreId]: { quantity, totalCost, avgCost } }
    metadata: {
      totalSpeculativeProfit: 0,
      totalMiningIncome: 0,
      totalExpenses: 0,
      totalAdjustments: 0,
    },
  });

  /* ====================================================
     SECTION 2: LOCALSTORAGE UTILITIES (Task 3)
     ==================================================== */

  const STORAGE_KEY = 'ore_ledger_state';

  const Storage = {
    loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createEmptyState();
        const parsed = JSON.parse(raw);
        // Basic validation
        if (parsed && typeof parsed === 'object' && Array.isArray(parsed.transactions)) {
          return parsed;
        }
        console.warn('Ore Ledger: Invalid state in localStorage, resetting to default');
        return createEmptyState();
      } catch (e) {
        console.warn('Ore Ledger: Failed to load state from localStorage, resetting:', e.message);
        return createEmptyState();
      }
    },

    saveState(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        return true;
      } catch (e) {
        console.error('Ore Ledger: Failed to save state:', e.message);
        return false;
      }
    },

    exportData() {
      return JSON.stringify(this.loadState(), null, 2);
    },

    importData(jsonStr) {
      try {
        const parsed = JSON.parse(jsonStr);
        if (parsed && typeof parsed === 'object' && Array.isArray(parsed.transactions)) {
          this.saveState(parsed);
          return true;
        }
        return false;
      } catch (e) {
        return false;
      }
    },

    clearAll() {
      localStorage.removeItem(STORAGE_KEY);
    },
  };

  /* ====================================================
     SECTION 3: BUSINESS LOGIC ENGINE (Task 4)
     ==================================================== */

  const r2 = (n) => Math.round(n * 100) / 100;

  const LedgerEngine = {
    /** Process a buy transaction and return updated state */
    processBuy(state, tx) {
      const s = structuredClone(state);
      const assetId = tx.asset;
      const qty = tx.quantity;
      const totalPaid = Math.abs(tx.totalAmount); // totalAmount is negative

      // Initialize portfolio entry if needed
      if (!s.portfolio[assetId]) {
        s.portfolio[assetId] = { quantity: 0, totalCost: 0, avgCost: 0 };
      }

      const p = s.portfolio[assetId];
      p.quantity += qty;
      p.totalCost += totalPaid;
      p.avgCost = r2(p.totalCost / p.quantity);

      s.cash -= totalPaid;
      s.transactions.push({ ...tx, id: generateId(), createdAt: Date.now() });

      return s;
    },

    /** Process a sell transaction and return updated state */
    processSell(state, tx) {
      const s = structuredClone(state);
      const assetId = tx.asset;
      const qty = tx.quantity;
      const received = tx.totalAmount; // positive
      const source = tx.source || 'portfolio';

      // Mined ore sell: no portfolio impact, pure income
      if (source === 'mined') {
        s.cash += received;
        s.metadata.totalMiningIncome += received;
        s.transactions.push({
          ...tx,
          id: generateId(),
          createdAt: Date.now(),
          profit: received, // full amount is profit (mined, no cost basis)
          source: 'mined',
        });
        return s;
      }

      // Portfolio sell: existing speculative logic
      const p = s.portfolio[assetId];
      if (!p || p.quantity < qty) {
        return { error: `Insufficient holdings: have ${p?.quantity || 0}, trying to sell ${qty}` };
      }

      const avgCostBefore = p.avgCost;
      const costOfSold = r2(qty * avgCostBefore);
      const profit = r2(received - costOfSold);

      p.quantity -= qty;
      p.totalCost = r2(p.totalCost - costOfSold);
      if (p.quantity <= 0) {
        p.quantity = 0;
        p.totalCost = 0;
        p.avgCost = 0;
      } else {
        p.avgCost = r2(p.totalCost / p.quantity);
      }

      s.cash += received;
      s.metadata.totalSpeculativeProfit += profit;

      s.transactions.push({
        ...tx,
        id: generateId(),
        createdAt: Date.now(),
        profit: profit,
        avgCostAtSale: avgCostBefore,
        costOfSold: costOfSold,
        source: 'portfolio',
      });

      return s;
    },

    /** Process a mine_sell transaction (no portfolio impact) */
    processMineSell(state, tx) {
      const s = structuredClone(state);
      const received = tx.totalAmount; // positive

      s.cash += received;
      s.metadata.totalMiningIncome += received;

      s.transactions.push({ ...tx, id: generateId(), createdAt: Date.now() });

      return s;
    },

    /** Process an expense transaction */
    processExpense(state, tx) {
      const s = structuredClone(state);
      const spent = Math.abs(tx.totalAmount); // totalAmount is negative

      s.cash -= spent;
      s.metadata.totalExpenses += spent;

      s.transactions.push({ ...tx, id: generateId(), createdAt: Date.now() });

      return s;
    },

    /** Process a balance adjustment */
    processBalanceAdjust(state, tx) {
      const s = structuredClone(state);
      const newBalance = tx.newBalance;
      const adjustment = r2(newBalance - s.cash);

      s.cash = newBalance;
      s.metadata.totalAdjustments += adjustment;

      s.transactions.push({
        ...tx,
        id: generateId(),
        createdAt: Date.now(),
        adjustment: adjustment,
        previousBalance: s.cash - adjustment, // will be overwritten by next line but we fix below
      });

      // Fix: compute previous before modifying
      const txIdx = s.transactions.length - 1;
      s.transactions[txIdx].previousBalance = r2(newBalance - adjustment);

      return s;
    },

    /** Compute summary statistics from current state */
    computeSummary(state) {
      const s = state;
      let portfolioValue = 0;
      let totalHoldings = 0;

      Object.entries(s.portfolio).forEach(([id, p]) => {
        if (p.quantity > 0) {
          totalHoldings += p.quantity;
          portfolioValue += r2(p.quantity * p.avgCost);
        }
      });

      return {
        cash: s.cash,
        speculativeProfit: r2(s.metadata.totalSpeculativeProfit),
        miningIncome: r2(s.metadata.totalMiningIncome),
        totalExpenses: r2(s.metadata.totalExpenses),
        totalAdjustments: r2(s.metadata.totalAdjustments),
        portfolioValue: r2(portfolioValue),
        totalHoldings,
        unrealizedPnL: r2(portfolioValue - Object.values(s.portfolio).reduce((sum, p) => sum + p.totalCost, 0)),
      };
    },

    /** Process a transaction: automatically detect type and route */
    process(state, tx) {
      switch (tx.type) {
        case 'buy':           return this.processBuy(state, tx);
        case 'sell':          return this.processSell(state, tx);
        case 'mine_sell':     return this.processMineSell(state, tx);
        case 'expense':       return this.processExpense(state, tx);
        case 'balance_adjust': return this.processBalanceAdjust(state, tx);
        default:              return { error: `Unknown transaction type: ${tx.type}` };
      }
    },
  };

  /* ====================================================
     SECTION 4: HOOKS & STATE MANAGEMENT
     ==================================================== */

  function useLedger() {
    const [state, setState] = useState(() => Storage.loadState());
    const saveTimerRef = useRef(null);

    // Auto-save with debounce
    useEffect(() => {
      if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
      saveTimerRef.current = setTimeout(() => {
        Storage.saveState(state);
      }, 500);
      return () => {
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
      };
    }, [state]);

    const summary = useMemo(() => LedgerEngine.computeSummary(state), [state]);

    const addTransaction = useCallback((tx) => {
      let success = false;
      setState(prev => {
        const result = LedgerEngine.process(prev, tx);
        if (result.error) {
          console.warn('Ore Ledger: Transaction rejected:', result.error);
          return prev;
        }
        success = true;
        return result;
      });
      return success;
    }, []);

    const deleteTransaction = useCallback((txId) => {
      setState(prev => {
        const tx = prev.transactions.find(t => t.id === txId);
        if (!tx) return prev;

        const s = structuredClone(prev);
        s.transactions = s.transactions.filter(t => t.id !== txId);

        // Reverse effects
        switch (tx.type) {
          case 'buy': {
            const assetId = tx.asset;
            const totalPaid = Math.abs(tx.totalAmount);
            if (s.portfolio[assetId]) {
              s.portfolio[assetId].quantity -= tx.quantity;
              s.portfolio[assetId].totalCost -= totalPaid;
              if (s.portfolio[assetId].quantity <= 0) {
                delete s.portfolio[assetId];
              } else {
                s.portfolio[assetId].avgCost = r2(s.portfolio[assetId].totalCost / s.portfolio[assetId].quantity);
              }
            }
            s.cash += totalPaid;
            break;
          }
          case 'sell': {
            const assetId = tx.asset;
            if (!s.portfolio[assetId]) {
              s.portfolio[assetId] = { quantity: 0, totalCost: 0, avgCost: 0 };
            }
            const p = s.portfolio[assetId];
            p.quantity += tx.quantity;
            p.totalCost += tx.costOfSold || (tx.quantity * (tx.avgCostAtSale || 0));
            p.avgCost = p.quantity > 0 ? r2(p.totalCost / p.quantity) : 0;
            s.cash -= tx.totalAmount;
            s.metadata.totalSpeculativeProfit -= (tx.profit || 0);
            break;
          }
          case 'mine_sell': {
            s.cash -= tx.totalAmount;
            s.metadata.totalMiningIncome -= tx.totalAmount;
            break;
          }
          case 'expense': {
            const spent = Math.abs(tx.totalAmount);
            s.cash += spent;
            s.metadata.totalExpenses -= spent;
            break;
          }
          case 'balance_adjust': {
            s.cash = tx.previousBalance || 0;
            s.metadata.totalAdjustments -= (tx.adjustment || 0);
            break;
          }
        }
        return s;
      });
    }, []);

    // Get transactions sorted by date DESC
    const sortedTransactions = useMemo(() => {
      return [...state.transactions].sort((a, b) => {
        // Sort by date first, then createdAt
        if (a.date !== b.date) return b.date.localeCompare(a.date);
        return (b.createdAt || 0) - (a.createdAt || 0);
      });
    }, [state.transactions]);

    // Get portfolio items with positive quantity
    const activePortfolio = useMemo(() => {
      return Object.entries(state.portfolio)
        .filter(([id, p]) => p.quantity > 0)
        .map(([id, p]) => {
          const ore = ORES.find(o => o.id === id);
          return {
            id,
            name: ore ? ore.name : id,
            category: ore ? ore.category : 'unknown',
            ...p,
            currentValue: r2(p.quantity * p.avgCost),
            pnl: r2((p.quantity * p.avgCost) - p.totalCost),
          };
        });
    }, [state.portfolio]);

    const getOreHolding = useCallback((oreId) => {
      return state.portfolio[oreId] || { quantity: 0, totalCost: 0, avgCost: 0 };
    }, [state.portfolio]);

    const recentTransactions = useMemo(() => {
      return sortedTransactions.slice(0, 5);
    }, [sortedTransactions]);

    return {
      state,
      summary,
      transactions: sortedTransactions,
      recentTransactions,
      activePortfolio,
      addTransaction,
      deleteTransaction,
      getOreHolding,
    };
  }

  /* ====================================================
     SECTION 5: UTILITY FUNCTIONS
     ==================================================== */

  const formatDate = (d) => {
    if (!d) return '';
    const date = new Date(d);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  };

  const formatCurrency = (n) => {
    if (n === undefined || n === null) return '0.0';
    const abs = Math.abs(n).toFixed(1);
    return n < 0 ? `-${abs}` : abs;
  };

  const formatCurrencyFull = (n) => {
    if (n === undefined || n === null) return '0.00';
    return n.toFixed(2);
  };

  /* ====================================================
     SECTION 6: TOAST NOTIFICATION SYSTEM
     ==================================================== */

  const ToastContext = createContext(null);

  function ToastProvider({ children }) {
    const [toasts, setToasts] = useState([]);
    const toastId = useRef(0);
    const exiting = useRef(new Set());

    const addToast = useCallback((message, type = 'success', duration = 3000) => {
      const id = ++toastId.current;
      setToasts(prev => [...prev, { id, message, type }]);
      setTimeout(() => {
        exiting.current.add(id);
        setToasts(prev => prev.filter(t => t.id !== id));
      }, duration);
    }, []);

    const removeToast = useCallback((id) => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, []);

    const colorMap = {
      success: 'var(--green)',
      error: 'var(--red)',
      info: 'var(--accent)',
    };

    return (
      <ToastContext.Provider value={addToast}>
        {children}
        <div style={{
          position: 'fixed', top: 20, right: 20, zIndex: 9999,
          display: 'flex', flexDirection: 'column', gap: 8,
          pointerEvents: 'none', alignItems: 'flex-end',
        }}>
          {toasts.map(toast => (
            <div key={toast.id} onClick={() => removeToast(toast.id)}
              style={{
                padding: '10px 18px',
                borderRadius: 'var(--radius-sm)',
                background: 'oklch(0.15 0.01 85)',
                color: 'oklch(0.92 0.005 85)',
                fontSize: '0.85rem',
                fontWeight: 480,
                lineHeight: 1.4,
                boxShadow: 'var(--shadow-elevated)',
                cursor: 'pointer',
                pointerEvents: 'auto',
                animation: 'toastSlide 250ms ease-out',
                maxWidth: 380,
                borderLeft: `3px solid ${colorMap[toast.type] || 'var(--accent)'}`,
              }}
            >
              {toast.message}
            </div>
          ))}
        </div>
      </ToastContext.Provider>
    );
  }

    const ctx = useContext(ToastContext);
    return ctx || (() => {});

  const TX_LABEL = { buy: 'Buy', sell: 'Sell', mine_sell: 'Mine Sale', expense: 'Expense', balance_adjust: 'Adjust' };

  function TransactionItem({ tx, onDelete, showDelete }) {
    const vis = TX_VISUAL[tx.type] || TX_VISUAL.buy;
    const bg = TX_BG[tx.type] || TX_BG.buy;
    const label = TX_LABEL[tx.type] || tx.type;
    const isNegative = tx.totalAmount < 0;
    const displayAmount = tx.type === 'balance_adjust'
      ? (tx.adjustment >= 0 ? `+${formatCurrencyFull(tx.adjustment)}` : formatCurrencyFull(tx.adjustment))
      : (isNegative ? `-${formatCurrencyFull(Math.abs(tx.totalAmount))}` : `+${formatCurrencyFull(tx.totalAmount)}`);
    const isPositiveAmount = tx.type === 'balance_adjust' ? tx.adjustment >= 0 : !isNegative;

    let name = tx.description || tx.asset || label;
    let metaParts = [`${label}`];
    if (tx.quantity) metaParts.push(`${tx.quantity}x`);
    metaParts.push(formatDate(tx.date));
    if (tx.note) metaParts.push(`· ${tx.note}`);
    if (tx.type === 'sell') {
      if (tx.source === 'mined') {
        metaParts.push(`· Mined · +${formatCurrencyFull(tx.profit)}`);
      } else if (tx.profit !== undefined) {
        metaParts.push(`· P&L: ${tx.profit >= 0 ? '+' : ''}${formatCurrencyFull(tx.profit)}`);

    return (

                <h3 style={{ fontFamily: "'Instrument Sans', sans-serif", fontWeight: 540, fontSize: '0.95rem', color: 'var(--text-secondary)', marginBottom: 4 }}>No transactions found</h3>
                <p style={{ fontSize: '0.82rem' }}>
                  {filterType === 'all' ? 'Record your first transaction to get started' : `No ${TX_LABEL[filterType]?.toLowerCase()} transactions yet`}
                </p>
              </div>
            ) : (
              <div>{filtered.map(tx => (
                <TransactionItem key={tx.id} tx={tx} onDelete={ledger.deleteTransaction} showDelete={true} />
              ))}</div>
            )}
          </SectionCard>
        </div>
      </div>
    );
  }

  /* ====================================================
     SECTION 10: PORTFOLIO PAGE (Task 8)
     ==================================================== */

  function PortfolioPage({ ledger }) {
    const { summary, activePortfolio } = ledger;

    const totalValue = activePortfolio.reduce((s, p) => s + p.currentValue, 0);
    const totalCost = activePortfolio.reduce((s, p) => s + p.totalCost, 0);
    const unrealizedPnL = totalValue - totalCost;
    const pnlPercent = totalCost > 0 ? (unrealizedPnL / totalCost * 100) : 0;

    return (
      <div className="page">
        <div style={{ maxWidth: 1120, margin: '0 auto', padding: 'var(--space-xl) var(--space-xl) var(--space-3xl)' }}>
          <div style={{ marginBottom: 24 }}>
            <h1 style={{
              fontFamily: "'Instrument Sans', sans-serif",
              fontWeight: 720, fontSize: '1.65rem',
              color: 'var(--text)', letterSpacing: '-0.015em',
            }}>Portfolio</h1>
            <p style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginTop: 4 }}>
              Your current ore holdings and cost basis
            </p>
          </div>

          {/* Summary Cards */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(190px, 1fr))', gap: 'var(--space-md)', marginBottom: 28 }}>
            <SummaryCard label="Total Holdings" value={`${summary.totalHoldings} items`} sub="Across all ores" />
            <SummaryCard label="Portfolio Value" value={formatCurrencyFull(totalValue)} sub={`Cost basis: ${formatCurrencyFull(totalCost)}`} />
            <SummaryCard
              label="Unrealized P&L"
              value={`${unrealizedPnL >= 0 ? '+' : ''}${formatCurrencyFull(unrealizedPnL)}`}
              typeVariant={unrealizedPnL >= 0 ? 'positive' : 'negative'}
              sub={`${pnlPercent >= 0 ? '+' : ''}${pnlPercent.toFixed(1)}%`}
            />
          </div>

          {/* Holdings Table */}
          <SectionCard title="Holdings">
            {activePortfolio.length === 0 ? (
              <div style={{ textAlign: 'center', padding: 'var(--space-2xl) var(--space-lg)', color: 'var(--text-muted)' }}>
                <div style={{
                  fontSize: '1.8rem', marginBottom: 14, opacity: 0.2,
                  fontFamily: "'DM Serif Display', serif", color: 'var(--text-secondary)',
                }}>∅</div>
                <h3 style={{ fontFamily: "'Instrument Sans', sans-serif", fontWeight: 540, fontSize: '0.95rem', color: 'var(--text-secondary)', marginBottom: 4 }}>No holdings yet</h3>
                <p style={{ fontSize: '0.95rem', fontWeight: 520 }}>Buy some ores to start building your portfolio</p>
              </div>
            ) : (
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr>
                      {['Ore', 'Quantity', 'Avg Cost', 'Total Cost', 'Value', 'P&L'].map(h => (
                          <th key={h} style={{
                            textAlign: h === 'Ore' ? 'left' : 'right',
                            fontSize: '0.8rem', textTransform: 'uppercase', letterSpacing: '0.06em',
                            color: 'var(--text-muted)', fontWeight: 650,
                            padding: '12px 16px',
                            borderBottom: '1px solid var(--border)',
                          }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {activePortfolio.map(p => {
                      const pnl = p.currentValue - p.totalCost;
                      return (
                        <tr key={p.id}>
                          <td style={{ padding: '12px 16px', fontSize: '1rem', fontWeight: 620, borderBottom: '1px solid var(--border-light)' }}>{p.name}</td>
                          <td style={{ padding: '12px 16px', fontSize: '1rem', fontFamily: "'JetBrains Mono', monospace", fontWeight: 580, textAlign: 'right', borderBottom: '1px solid var(--border-light)' }}>{p.quantity}</td>
                          <td style={{ padding: '12px 16px', fontSize: '1rem', fontFamily: "'JetBrains Mono', monospace", fontWeight: 580, textAlign: 'right', borderBottom: '1px solid var(--border-light)' }}>{formatCurrencyFull(p.avgCost)}</td>
                          <td style={{ padding: '12px 16px', fontSize: '1rem', fontFamily: "'JetBrains Mono', monospace", fontWeight: 580, textAlign: 'right', borderBottom: '1px solid var(--border-light)' }}>{formatCurrencyFull(p.totalCost)}</td>
                          <td style={{ padding: '12px 16px', fontSize: '1rem', fontFamily: "'JetBrains Mono', monospace", fontWeight: 580, textAlign: 'right', borderBottom: '1px solid var(--border-light)' }}>{formatCurrencyFull(p.currentValue)}</td>
                          <td style={{
                            padding: '12px 16px', fontSize: '1rem',
                            fontFamily: "'JetBrains Mono', monospace", fontWeight: 580,
                            textAlign: 'right', borderBottom: '1px solid var(--border-light)',
                            color: pnl >= 0 ? 'var(--green)' : 'var(--red)',

              </div>

          </SectionCard>

          {activePortfolio.length > 0 && (
            <div style={{ marginTop: 14, fontSize: '0.75rem', color: 'var(--text-muted)' }}>
              * Current values shown at average cost (no real-time pricing).
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ====================================================
     SECTION 11: NEW ENTRY PAGE (Task 9 — Form Stub)
     ==================================================== */

  function NewEntryPage({ ledger, preselectedType, onNavigate }) {
    const { getOreHolding, addTransaction } = ledger;
    const toast = useToast();
    const [txType, setTxType] = React.useState(preselectedType || 'buy');
    const [saleSource, setSaleSource] = React.useState('portfolio');
    const [formError, setFormError] = React.useState('');

    // Sync txType when preselectedType changes (e.g., quick action from Dashboard)
    useEffect(() => {
      if (preselectedType && preselectedType !== txType) {
        setTxType(preselectedType);
      }
    }, [preselectedType]);

    // Form fields (shared)
    const [date, setDate] = React.useState(() => new Date().toISOString().split('T')[0]);
    const [oreId, setOreId] = React.useState('');
    const [quantity, setQuantity] = React.useState('');
    const [unitPrice, setUnitPrice] = React.useState('');
    const [description, setDescription] = React.useState('');
    const [newBalance, setNewBalance] = React.useState('');
    const [note, setNote] = React.useState('');

    // Reset form when type changes
    useEffect(() => {
      setOreId('');
      setQuantity('');
      setUnitPrice('');
      setDescription('');
      setNewBalance('');
      setNote('');
      setSaleSource('portfolio');
    }, [txType]);

    // Filter ores for sell: only owned ores for portfolio, all ores for mined
    const availableOres = useMemo(() => {
      if (txType === 'sell') {
        if (saleSource === 'mined') return ORES;
        return ORES.filter(o => {
          const h = getOreHolding(o.id);
          return h.quantity > 0;
        });
      }
      return ORES;
    }, [txType, saleSource, getOreHolding]);

    // Group ores by category
    const groupedOres = useMemo(() => {
      const groups = { shallow: [], deep: [], nether: [] };
      availableOres.forEach(o => {
        if (groups[o.category]) groups[o.category].push(o);
      });
      return groups;
    }, [availableOres]);

    // Category labels
    const CATEGORY_LABELS = { shallow: 'Shallow', deep: 'Deep', nether: 'Nether' };

    // Holdings info for sell
    const currentHolding = getOreHolding(oreId);

    // Auto-calculated total
    const calculatedTotal = useMemo(() => {
      const q = parseFloat(quantity) || 0;
      const p = parseFloat(unitPrice) || 0;
      const total = q * p;
      if (txType === 'buy') return -total;
      return total;
    }, [quantity, unitPrice, txType]);

    // Balance adjust auto-delta
    const adjustmentDelta = useMemo(() => {
      if (txType !== 'balance_adjust') return null;
      const nb = parseFloat(newBalance);
      if (isNaN(nb)) return null;
      return nb - ledger.summary.cash;
    }, [newBalance, txType, ledger.summary.cash]);

    // Estimated profit for sell
    const estimatedProfit = useMemo(() => {
      if (txType !== 'sell' || !oreId || !quantity) return null;
      const q = parseFloat(quantity) || 0;
      const p = parseFloat(unitPrice) || 0;
      const received = q * p;
      if (saleSource === 'mined') return received; // Full amount is profit (mined)
      const cost = q * currentHolding.avgCost;
      return received - cost;
    }, [txType, saleSource, oreId, quantity, unitPrice, currentHolding]);

    // Quick quantity buttons
    const QUICK_QTY = [1, 16, 64];

    // Ore category icons
    const CATEGORY_ICONS = { shallow: '⬆', deep: '⬇', nether: '🔥' };

    // Form submission handler
    const handleSubmit = useCallback(() => {
      setFormError('');

      // Validate
      if (!date) { setFormError('Date is required'); return; }

      if (txType === 'buy' || txType === 'sell' || txType === 'mine_sell') {
        if (!oreId) { setFormError('Please select an ore'); return; }
        const q = parseInt(quantity, 10);
        if (!q || q <= 0) { setFormError('Quantity must be greater than 0'); return; }
        const p = parseFloat(unitPrice);
        if (!p || p <= 0) { setFormError('Unit price must be greater than 0'); return; }

        if (txType === 'sell' && saleSource === 'portfolio') {
          const holding = getOreHolding(oreId);
          if (q > holding.quantity) {
            setFormError(`Cannot sell ${q} units — only ${holding.quantity} held`);
            return;
          }
        }
      } else if (txType === 'expense') {
        if (!description.trim()) { setFormError('Description is required'); return; }
        const amt = parseFloat(unitPrice);
        if (!amt || amt <= 0) { setFormError('Amount must be greater than 0'); return; }
      } else if (txType === 'balance_adjust') {
        const nb = parseFloat(newBalance);
        if (isNaN(nb) || nb < 0) { setFormError('Please enter a valid cash balance'); return; }
      }

      // Build transaction object
      let totalAmount = 0;
      const q = parseInt(quantity, 10);
      const p = parseFloat(unitPrice);

      switch (txType) {
        case 'buy':
          totalAmount = -(q * p);
          break;
        case 'sell':
        case 'mine_sell':
          totalAmount = q * p;
          break;
        case 'expense':
          totalAmount = -Math.abs(parseFloat(unitPrice));
          break;
        case 'balance_adjust':
          totalAmount = 0; // not used for adjust
          break;
      }

      const tx = {
        type: txType,
        date,
        asset: (txType === 'buy' || txType === 'sell' || txType === 'mine_sell') ? oreId : undefined,
        quantity: (txType === 'buy' || txType === 'sell' || txType === 'mine_sell') ? q : undefined,
        unitPrice: (txType === 'buy' || txType === 'sell' || txType === 'mine_sell') ? p : (txType === 'expense' ? parseFloat(unitPrice) : undefined),
        totalAmount: txType === 'balance_adjust' ? 0 : totalAmount,
        newBalance: txType === 'balance_adjust' ? parseFloat(newBalance) : undefined,
        description: txType === 'expense' ? description.trim() : undefined,
        note: note.trim() || undefined,
        source: txType === 'sell' ? saleSource : undefined,
      };

      const success = addTransaction(tx);
      if (success === false || success === undefined) {
        setFormError('Failed to record transaction. Check portfolio holdings.');
        return;
      }

      toast('Transaction recorded successfully', 'success');

      // Reset form
      setOreId(''); setQuantity(''); setUnitPrice(''); setDescription('');
      setNewBalance(''); setNote('');
      setDate(new Date().toISOString().split('T')[0]);
      setFormError('');

      // Navigate to transactions page
      setTimeout(() => onNavigate('transactions'), 1000);
    }, [txType, date, oreId, quantity, unitPrice, description, newBalance, note, addTransaction, getOreHolding, toast, onNavigate]);

    return (
      <div className="page">
        <div style={{ maxWidth: 800, margin: '0 auto', padding: 'var(--space-xl) var(--space-xl) var(--space-3xl)' }}>
          <div style={{ marginBottom: 24 }}>
            <h1 style={{
              fontFamily: "'Instrument Sans', sans-serif",
              fontWeight: 720, fontSize: '1.65rem',
              color: 'var(--text)', letterSpacing: '-0.015em',
            }}>New Entry</h1>
            <p style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginTop: 4 }}>
              Record a new transaction or activity
            </p>
          </div>

          {/* Type selector — pill-style */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 24, flexWrap: 'wrap' }}>
            {[
              { type: 'buy', icon: '↓', label: 'Buy', color: 'var(--green)' },
              { type: 'sell', icon: '↑', label: 'Sell', color: 'var(--blue)' },
              { type: 'mine_sell', icon: '⛏', label: 'Mine Sale', color: 'var(--amber)' },
              { type: 'expense', icon: '✕', label: 'Expense', color: 'var(--red)' },
              { type: 'balance_adjust', icon: '⟳', label: 'Adjust', color: 'var(--accent)' },
            ].map(btn => (
              <button key={btn.type} onClick={() => setTxType(btn.type)} style={{
                display: 'flex', alignItems: 'center', gap: '7px',
                padding: '8px 16px',
                borderRadius: 'var(--radius-sm)',
                border: '1px solid',
                borderColor: txType === btn.type ? btn.color : 'var(--border)',
                background: txType === btn.type ? `${btn.color}12` : 'transparent',
                color: txType === btn.type ? btn.color : 'var(--text-secondary)',
                cursor: 'pointer', fontSize: '0.95rem',
                fontWeight: txType === btn.type ? 580 : 500,
                fontFamily: 'inherit', transition: 'all var(--transition)',
              }}>
                <span style={{ fontSize: '0.9rem', lineHeight: 1 }}>{btn.icon}</span>
                <span>{btn.label}</span>
              </button>
            ))}
          </div>

          {/* Form */}
          <SectionCard title={TX_LABEL[txType] || 'Transaction'}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
              {/* Date */}
              <div>
                <label style={{
                  display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                  fontWeight: 530, marginBottom: 6, letterSpacing: '0.01em',
                }}>Date</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{
                  width: '100%', padding: '9px 14px',
                  borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                  background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                  outline: 'none', transition: 'border-color var(--transition)',
                  fontFamily: "'Instrument Sans', sans-serif",
                }} />
              </div>

              {/* Source toggle (sell only) */}
              {txType === 'sell' && (
                <div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>Source of Ore</label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => setSaleSource('portfolio')} style={{
                      flex: 1, padding: '10px 14px',
                      borderRadius: 'var(--radius-sm)',
                      border: '1.5px solid',
                      borderColor: saleSource === 'portfolio' ? 'var(--blue)' : 'var(--border)',
                      background: saleSource === 'portfolio' ? 'var(--blue-bg)' : 'transparent',
                      color: saleSource === 'portfolio' ? 'var(--blue)' : 'var(--text-secondary)',
                      cursor: 'pointer', fontSize: '0.8rem', fontWeight: saleSource === 'portfolio' ? 600 : 400,
                      fontFamily: 'inherit', transition: 'all var(--transition)',
                    }}>
                      <div style={{ fontWeight: 600 }}>Portfolio</div>
                      <div style={{ fontSize: '0.7rem', opacity: 0.7, marginTop: 1 }}>Sell bought ores</div>
                    </button>
                    <button onClick={() => setSaleSource('mined')} style={{
                      flex: 1, padding: 'var(--space-sm) var(--space-md)',
                      borderRadius: 'var(--radius-sm)',
                      border: `1.5px solid ${saleSource === 'mined' ? 'var(--amber)' : 'var(--border)'}`,
                      background: saleSource === 'mined' ? 'var(--amber-bg)' : 'transparent',
                      color: saleSource === 'mined' ? 'var(--amber)' : 'var(--text-secondary)',
                      cursor: 'pointer', fontSize: '0.8rem', fontWeight: saleSource === 'mined' ? 600 : 400,
                      fontFamily: 'inherit', transition: 'all var(--transition)',
                    }}>
                      <div style={{ fontWeight: 600 }}>Mined</div>
                      <div style={{ fontSize: '0.7rem', opacity: 0.7, marginTop: 1 }}>Sell mined ores</div>
                    </button>
                  </div>
                </div>
              )}

              {/* Ore selector (for buy/sell/mine_sell) */}
              {(txType === 'buy' || txType === 'sell' || txType === 'mine_sell') && (
                <div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>
                    Ore {txType === 'sell' ? (saleSource === 'mined' ? '' : '(owned only)') : ''}
                  </label>
                  {txType === 'sell' && saleSource === 'portfolio' && availableOres.length === 0 ? (
                    <div style={{
                      padding: '14px 14px',
                      background: 'var(--surface-hover)',
                      borderRadius: 'var(--radius-sm)',
                      fontSize: '0.82rem', color: 'var(--text-muted)',
                      textAlign: 'center', border: '1px dashed var(--border)',
                    }}>
                      No ores in portfolio. Buy some ores first before selling.
                    </div>
                  ) : (
                    <select value={oreId} onChange={e => setOreId(e.target.value)} style={{
                      width: '100%', padding: '9px 14px',
                      borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                      background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                      outline: 'none', cursor: 'pointer',
                      fontFamily: "'Instrument Sans', sans-serif",
                    }}>
                      <option value="">Select an ore...</option>
                      {['shallow', 'deep', 'nether'].map(cat =>
                        groupedOres[cat] && groupedOres[cat].length > 0 ? (
                          <optgroup key={cat} label={`${CATEGORY_ICONS[cat]} ${CATEGORY_LABELS[cat]}`}>
                            {groupedOres[cat].map(o => (
                              <option key={o.id} value={o.id}>{o.name}</option>
                            ))}
                          </optgroup>
                        ) : null
                      )}
                    </select>
                  )}
                  {txType === 'sell' && oreId && saleSource === 'portfolio' && (
                    <div style={{ marginTop: 6, fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                      Holding: {currentHolding.quantity} units · Avg cost: {formatCurrencyFull(currentHolding.avgCost)}
                    </div>
                  )}
                  {txType === 'sell' && saleSource === 'mined' && (
                    <div style={{ marginTop: 6, fontSize: '0.75rem', color: 'var(--amber)' }}>
                      Mined ore sale — full amount is mining income
                    </div>
                  )}
                </div>
              )}

              {/* Quantity (for buy/sell/mine_sell) */}
              {(txType === 'buy' || txType === 'sell' || txType === 'mine_sell') && (
                <div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>Quantity</label>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <input type="number" min="1" value={quantity} onChange={e => setQuantity(e.target.value)} placeholder="0"
                      style={{
                        flex: 1, padding: '9px 14px',
                        borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                        background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                        outline: 'none',
                      }} />
                    {QUICK_QTY.map(q => (
                      <button key={q} onClick={() => setQuantity(String(q))} style={{
                        padding: '9px 14px',
                        borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                        background: 'var(--surface)', cursor: 'pointer',
                        fontSize: '0.9rem', fontWeight: 520, color: 'var(--text-muted)',
                        fontFamily: 'inherit', transition: 'all var(--transition)',
                      }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--accent)'; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text-muted)'; }}
                      >{q}</button>
                    ))}
                    {txType === 'sell' && oreId && (
                      <button onClick={() => setQuantity(String(currentHolding.quantity))} style={{
                        padding: '9px 14px',
                        borderRadius: 'var(--radius-sm)', border: '1px solid var(--blue)',
                        background: 'var(--blue-bg)', cursor: 'pointer',
                        fontSize: '0.78rem', fontWeight: 550, color: 'var(--blue)',
                        fontFamily: 'inherit',
                      }}>ALL</button>
                    )}
                  </div>
                </div>
              )}

              {/* Unit Price (for buy/sell/mine_sell) */}
              {(txType === 'buy' || txType === 'sell' || txType === 'mine_sell') && (
                <div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>Unit Price</label>
                  <input type="number" min="0" step="0.01" value={unitPrice} onChange={e => setUnitPrice(e.target.value)} placeholder="0.00"
                    style={{
                      width: '100%', padding: '9px 14px',
                      borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                      background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                      outline: 'none',
                    }} />
                </div>
              )}

              {/* Auto-calculated total */}
              {(txType === 'buy' || txType === 'sell' || txType === 'mine_sell') && quantity && unitPrice && (
                <div style={{
                  padding: '10px 14px',
                  background: 'var(--surface-hover)',
                  borderRadius: 'var(--radius-sm)',
                  fontSize: '0.82rem',
                  color: 'var(--text-secondary)',
                }}>
                  Total: <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 550, color: txType === 'buy' ? 'var(--red)' : 'var(--green)' }}>
                    {txType === 'buy' ? '-' : '+'}{formatCurrencyFull(Math.abs(calculatedTotal))}
                  </span>
                </div>
              )}

              {/* Estimated profit (sell) */}
              {txType === 'sell' && estimatedProfit !== null && (
                <div style={{
                  padding: '10px 14px',
                  background: saleSource === 'mined' ? 'var(--amber-bg)' : 'var(--accent-glow)',
                  borderRadius: 'var(--radius-sm)',
                  fontSize: '0.82rem',
                  color: saleSource === 'mined' ? 'var(--amber)' : 'var(--accent-dark)',
                }}>
                  {saleSource === 'mined' ? 'Mining Income' : 'Estimated P&L'}: <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 550, color: estimatedProfit >= 0 ? 'var(--green)' : 'var(--red)' }}>
                    +{formatCurrencyFull(estimatedProfit)}
                  </span>
                </div>
              )}

              {/* Description (for expense) */}
              {txType === 'expense' && (
                <div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>Description</label>
                  <input type="text" value={description} onChange={e => setDescription(e.target.value)} placeholder="What did you buy?"
                    style={{
                      width: '100%', padding: '9px 14px',
                      borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                      background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                      outline: 'none',
                    }} />
                </div>
              )}

              {/* Expense amount */}
              {txType === 'expense' && (
                <div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>Amount Spent</label>
                  <input type="number" min="0" step="0.01" value={unitPrice} onChange={e => setUnitPrice(e.target.value)} placeholder="0.00"
                    style={{
                      width: '100%', padding: '9px 14px',
                      borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                      background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                      outline: 'none',
                    }} />
                </div>
              )}

              {/* Balance Adjust: new balance */}
              {txType === 'balance_adjust' && (
                <div>
                  <div style={{
                    padding: '10px 14px',
                    background: 'var(--surface-hover)',
                    borderRadius: 'var(--radius-sm)',
                    fontSize: '0.82rem', color: 'var(--text-secondary)',
                    marginBottom: 14,
                  }}>
                    Current system balance: <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 550 }}>{formatCurrencyFull(ledger.summary.cash)}</span>
                  </div>
                  <label style={{
                    display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                    fontWeight: 530, marginBottom: 6,
                  }}>Actual Cash in Pocket</label>
                  <input type="number" step="0.01" value={newBalance} onChange={e => setNewBalance(e.target.value)} placeholder="Enter actual cash amount"
                    style={{
                      width: '100%', padding: '9px 14px',
                      borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                      background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                      outline: 'none',
                    }} />
                  {adjustmentDelta !== null && (
                    <div style={{ marginTop: 8, fontSize: '0.78rem', color: adjustmentDelta >= 0 ? 'var(--green)' : 'var(--red)' }}>
                      Adjustment: {adjustmentDelta >= 0 ? '+' : ''}{formatCurrencyFull(adjustmentDelta)}
                    </div>
                  )}
                </div>
              )}

              {/* Notes */}
              <div>
                <label style={{
                  display: 'block', fontSize: '0.78rem', color: 'var(--text-muted)',
                  fontWeight: 530, marginBottom: 6,
                }}>Notes <span style={{               fontWeight: 380 }}>(optional)</span></label>
                <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="Add a note..."
                  style={{
                    width: '100%', padding: '9px 14px',
                    borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)',
                    background: 'var(--surface)', color: 'var(--text)', fontSize: '1rem',
                    outline: 'none',
                  }} />
              </div>

              {/* Form error message */}
              {formError && (
                <div style={{
                  padding: '10px 14px',
                  background: 'var(--red-bg)',
                  borderRadius: 'var(--radius-sm)',
                  fontSize: '0.82rem', color: 'var(--red)',
                  fontWeight: 480,
                }}>{formError}</div>
              )}

              {/* Submit button */}
              <button onClick={handleSubmit} style={{
                width: '100%', padding: '12px',
                borderRadius: 'var(--radius-sm)',
                background: 'var(--accent)', border: 'none',
                color: '#fff', fontSize: '1rem', fontWeight: 640,
                cursor: 'pointer', fontFamily: 'inherit',
                transition: 'all var(--transition)',
                letterSpacing: '0.01em',
              }}
                onMouseEnter={e => { e.currentTarget.style.background = 'var(--accent-dark)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'var(--accent)'; }}
              >
                Record {TX_LABEL[txType] || 'Transaction'}
              </button>
            </div>
          </SectionCard>

          {/* Ore Reference & Quick Tips */}
          <div style={{ marginTop: 24, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--space-md)' }}>
            <SectionCard title="Ore Reference">
              <div style={{ fontSize: '0.82rem' }}>
                {['shallow', 'deep', 'nether'].map(cat => (
                  <div key={cat} style={{ marginBottom: 14 }}>
                    <div style={{
                      fontWeight: 620, fontSize: '0.82rem',
                      textTransform: 'uppercase', letterSpacing: '0.05em',
                      color: 'var(--text-muted)', marginBottom: 4,
                    }}>
                      {CATEGORY_ICONS[cat]} {CATEGORY_LABELS[cat]}
                    </div>
                    {ORES.filter(o => o.category === cat).map(o => (
                      <div key={o.id} style={{ padding: '2px 0', color: 'var(--text-secondary)', fontSize: '0.95rem' }}>{o.name}</div>
                    ))}
                  </div>
                ))}
              </div>
            </SectionCard>
            <SectionCard title="Quick Tips">
              <div style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', lineHeight: 1.8 }}>
                <div><span style={{ fontWeight: 620, color: 'var(--green)' }}>↓ Buy</span> — Buy ores for portfolio</div>
                <div><span style={{ fontWeight: 620, color: 'var(--blue)' }}>↑ Sell</span> — Sell from portfolio or mined</div>
                <div><span style={{ fontWeight: 620, color: 'var(--amber)' }}>⛏ Mine Sale</span> — Pure mining income</div>
                <div><span style={{ fontWeight: 620, color: 'var(--red)' }}>✕ Expense</span> — Record spending</div>
                <div><span style={{ fontWeight: 620, color: 'var(--accent)' }}>⟳ Adjust</span> — Calibrate cash</div>
              </div>
            </SectionCard>
          </div>
        </div>
      </div>
    );
  }

  /* ====================================================
     SECTION 12: APP COMPONENT
     ==================================================== */

  function App() {
    const [activeNav, setActiveNav] = React.useState('dashboard');
    const [preselectedType, setPreselectedType] = React.useState(null);
    const [theme, setTheme] = React.useState(() => {
      try { return localStorage.getItem('ore_ledger_theme') || 'dark'; }
      catch { return 'dark'; }
    });
    const ledger = useLedger();

    // Apply theme data attribute
    useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
      try { localStorage.setItem('ore_ledger_theme', theme); }
      catch {}
    }, [theme]);

    const toggleTheme = useCallback(() => {
      setTheme(prev => prev === 'dark' ? 'light' : 'dark');
    }, []);

    const handleNavigate = useCallback((page, type) => {
      setPreselectedType(type || null);
      setActiveNav(page);
    }, []);

    const handleExport = useCallback(() => {
      const json = Storage.exportData();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ore_ledger_backup_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }, []);

    const handleClear = useCallback(() => {
      if (window.confirm('Clear ALL data? This cannot be undone.')) {
        Storage.clearAll();
        window.location.reload();
      }
    }, []);

    const pageTitle = useMemo(() => {
      const item = NAV_ITEMS.find(n => n.id === activeNav);
      return item ? item.label : 'Dashboard';
    }, [activeNav]);

    const renderPage = () => {
      switch (activeNav) {
        case 'dashboard':
          return <DashboardPage ledger={ledger} onNavigate={handleNavigate} />;
        case 'transactions':
          return <TransactionsPage ledger={ledger} onNavigate={handleNavigate} />;
        case 'portfolio':
          return <PortfolioPage ledger={ledger} />;
        case 'new-entry':
          return <NewEntryPage ledger={ledger} preselectedType={preselectedType} onNavigate={handleNavigate} />;
        default:
          return <DashboardPage ledger={ledger} onNavigate={handleNavigate} />;
      }
    };

    return (
      <div style={{ display: 'flex', minHeight: '100vh' }}>
        <Sidebar activeNav={activeNav} onNavChange={(page) => handleNavigate(page)} onExport={handleExport} onClear={handleClear} theme={theme} onToggleTheme={toggleTheme} />
        <div style={{ marginLeft: 'var(--sidebar-w)', flex: 1, minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <TopBar title={pageTitle} cashBalance={ledger.summary.cash} />
          {renderPage()}
        </div>
      </div>
    );
  }

  /* ====================================================
     MOUNT
     ==================================================== */

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <ToastProvider>
      <App />
    </ToastProvider>
  );
</script>
</body>
</html>
